apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gestor-gastro
  namespace: umami-gestor-gastro-hml
  labels:
    app.kubernetes.io/name: gestor-gastro
    app.kubernetes.io/part-of: umami-tech
  annotations:
    kubernetes.io/ingress.class: traefik
    umami.tech/routing-note: hostname-root-serves-admin-no-shop-exposure
spec:
  ingressClassName: traefik
  rules:
    - host: gestor-gastro-hml.umamitech.net.br
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gestor-gastro-admin
                port:
                  number: 3000
