apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: gestor-gastro-shop-modelo
  namespace: umami-gestor-gastro-hml
  labels:
    app.kubernetes.io/name: gestor-gastro-shop-modelo
    app.kubernetes.io/part-of: umami-tech
  annotations:
    kubernetes.io/ingress.class: traefik
    umami.tech/routing-note: shop-modelo-host-proxies-api-to-admin
spec:
  ingressClassName: traefik
  rules:
    - host: shop-modelo-gestor-gastro-hml.umamitech.net.br
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: gestor-gastro-admin
                port:
                  number: 3000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gestor-gastro-shop
                port:
                  number: 80
