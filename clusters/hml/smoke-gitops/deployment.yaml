apiVersion: apps/v1
kind: Deployment
metadata:
  name: hml-smoke-gitops
  namespace: umami-gitops-hml
  labels:
    app.kubernetes.io/name: hml-smoke-gitops
    app.kubernetes.io/part-of: umami-tech
    app.kubernetes.io/managed-by: gitops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hml-smoke-gitops
  template:
    metadata:
      labels:
        app: hml-smoke-gitops
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi